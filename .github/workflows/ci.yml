name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: qa_user
          POSTGRES_PASSWORD: qa_password
          POSTGRES_DB: automation_testing
        ports:
          - 5432:5432

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.27.0
          wget -q "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -zxf "allure-${ALLURE_VERSION}.tgz"
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Generate Allure report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report --single-file

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: target/allure-report/
          if-no-files-found: ignore

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/**/*.xml
          check_name: Maven test results

      - name: Upload Cucumber reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: target/cucumber-reports/
          if-no-files-found: ignore
