version: '3.8'
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: test_automation_db
    environment:
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
      POSTGRES_DB: automation_testing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: